<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王海诺的网页项目</title>
    <style>
        :root {
            --bg: #faf9f6;
            --card: #ffffff;
            --text: #2d3436;
            --text-secondary: #636e72;
            --accent: #0984e3;
            --accent-light: #e8f4fd;
            --border: #dfe6e9;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --radius: 12px;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a2e;
                --card: #16213e;
                --text: #eee;
                --text-secondary: #a0a0b0;
                --accent: #74b9ff;
                --accent-light: #1e3a5f;
                --border: #2d3a5e;
                --shadow: 0 2px 12px rgba(0,0,0,0.3);
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        h1 {
            font-size: clamp(24px, 5vw, 36px);
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 40px;
            text-align: center;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 900px;
            width: 100%;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .card .icon {
            font-size: 32px;
            margin-bottom: 12px;
        }
        .card h2 {
            font-size: 18px;
            margin-bottom: 8px;
        }
        .card p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .card .tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            margin-top: 12px;
            background: var(--accent-light);
            color: var(--accent);
        }
    </style>
</head>
<body>
    <h1>王海诺的网页项目</h1>
    <p class="subtitle">Interactive Web Projects</p>

    <div class="grid">
        <a href="hk-housing-map.html" class="card">
            <div class="icon">&#127968;</div>
            <h2>香港找房指南</h2>
            <p>香港各区租房信息交互地图，帮助快速了解各区域租金、交通、生活配套等情况。</p>
            <span class="tag">地图可视化</span>
        </a>

        <a href="vx公众号文章网页版解析/江湖老师傅和吸星大法.html" class="card">
            <div class="icon">&#128218;</div>
            <h2>江湖老师傅和"吸星大法"</h2>
            <p>付鹏财经世界文章的交互式学习版本，包含概念卡片、知识测验、因果链条可视化等互动元素。</p>
            <span class="tag">交互式教学</span>
            <span class="tag">金融分析</span>
        </a>
    </div>
</body>
</html>
